name: nightly
on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  lanes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .node-version
      - id: run
        run: |
          set -o pipefail
          node scripts/validate-contracts.mjs 2>&1 | tee lane.log
          node scripts/check-public-hygiene.mjs 2>&1 | tee -a lane.log
      - if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY=$(tail -1 lane.log | cut -c1-120)
          gh issue create -R "$GITHUB_REPOSITORY" -l ci-failure \
            -t "nightly: lane failure $(date -u +%F)" \
            -b "Failing check: see run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Summary: ${SUMMARY}. (One-line summary only by policy — no raw log excerpts.)"
