name: nightly
on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  lanes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .node-version
      - id: run
        run: |
          set -o pipefail
          node scripts/validate-contracts.mjs 2>&1 | tee lane.log
          node scripts/check-public-hygiene.mjs 2>&1 | tee -a lane.log
      - if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Consume the structured SUMMARY: marker each validator emits (prefer a FAILED
          # one, which names the failing lane), not the last log line by position.
          SUMMARY=$(grep -h '^SUMMARY:' lane.log | grep -m1 FAILED || grep -h -m1 '^SUMMARY:' lane.log || tail -1 lane.log)
          SUMMARY=$(printf '%s' "$SUMMARY" | cut -c1-200)
          BODY="Failing check: see run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. ${SUMMARY} (Structured one-line summary only by policy — no raw log excerpts.)"
          # Dedup: comment on the existing open ci-failure issue rather than opening a new one nightly.
          EXISTING=$(gh issue list -R "$GITHUB_REPOSITORY" -l ci-failure --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" -R "$GITHUB_REPOSITORY" -b "$(date -u +%F): ${BODY}"
          else
            gh issue create -R "$GITHUB_REPOSITORY" -l ci-failure \
              -t "nightly: lane failure $(date -u +%F)" \
              -b "$BODY"
          fi
