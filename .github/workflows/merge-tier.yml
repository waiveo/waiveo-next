name: merge-tier
on:
  push:
    branches:
      - main
permissions:
  contents: read
concurrency:
  group: merge-${{ github.ref }}
  cancel-in-progress: false
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .node-version
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: node scripts/validate-contracts.mjs
      - run: node scripts/check-public-hygiene.mjs
      - name: ui-schema/1 — automation-builder fixture-lint
        run: node conformance/fixtures/fixture-lint.mjs
      - run: node --test 'scripts/**/*.test.mjs'
      - name: api/1 — OpenAPI 3.1 validity
        run: npx --yes @redocly/cli@2.39.0 lint api/openapi.yaml
      - name: api/1 — TS codegen (generate, drift check, typecheck)
        working-directory: scripts/codegen
        run: |
          npm ci --ignore-scripts
          npm run generate:ts
          git diff --exit-code -- ../../api/gen/ts
          npm run typecheck
      - name: api/1 — Go codegen (generate, drift check, vet)
        run: |
          go tool oapi-codegen -config scripts/codegen/oapi-codegen.yaml api/openapi.yaml
          git diff --exit-code -- api/gen/go
          go build ./...
          go vet ./...
      # conformance suites append here as they exist
